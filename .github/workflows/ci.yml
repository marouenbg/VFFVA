name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-glpk:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mpi-procs: [1]
        omp-threads: [2]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglpk-dev libopenmpi-dev openmpi-bin lcov
          pip install cobra scipy

      - name: Build with GLPK
        working-directory: lib
        run: |
          make SOLVER=glpk COVERAGE=1 \
               GLPKINCDIR=/usr/include \
               GLPKLIBDIR=/usr/lib/x86_64-linux-gnu

      # ── Generate MPS and cobrapy ground truth for each model ──

      - name: Generate E. coli core ground truth
        run: |
          python3 lib/mat2mps.py \
            data/models/Ecoli_core/ecoli_core_model.mat \
            data/models/Ecoli_core/Ecoli_core.mps \
            --name Ecoli_co
          python3 lib/generate_reference.py \
            data/models/Ecoli_core/ecoli_core_model.mat \
            data/models/Ecoli_core/reference_fva.csv

      - name: Generate E. coli K12 ground truth
        run: |
          python3 lib/mat2mps.py \
            data/models/Ecoli_K12/iAF1260.mat \
            data/models/Ecoli_K12/Ecoli_K12.mps \
            --name Ecoli_K1
          python3 lib/generate_reference.py \
            data/models/Ecoli_K12/iAF1260.mat \
            data/models/Ecoli_K12/reference_fva.csv

      # ── Run VFFVA and compare ──

      - name: Run VFFVA on E. coli core
        working-directory: lib
        run: |
          export OMP_SCHEDULE="dynamic,50"
          mpirun -np ${{ matrix.mpi-procs }} \
                 --bind-to none \
                 --oversubscribe \
                 -x OMP_NUM_THREADS=${{ matrix.omp-threads }} \
                 ./veryfastFVA ../data/models/Ecoli_core/Ecoli_core.mps 90

      - name: Validate E. coli core output
        run: |
          OUTPUT="data/models/Ecoli_core/Ecoli_coreoutput.csv"
          HEAD=$(head -1 "$OUTPUT")
          [ "$HEAD" = "minFlux,maxFlux" ] || { echo "Bad header: $HEAD"; exit 1; }
          LINES=$(wc -l < "$OUTPUT")
          [ "$LINES" -eq 96 ] || { echo "Expected 96 lines, got $LINES"; exit 1; }
          echo "E. coli core: 95 reactions OK"

      - name: Compare E. coli core against cobrapy
        run: |
          python3 -c "
          import csv, sys
          tol = 1e-3
          with open('data/models/Ecoli_core/reference_fva.csv') as f:
              ref = list(csv.reader(f))[1:]
          with open('data/models/Ecoli_core/Ecoli_coreoutput.csv') as f:
              out = list(csv.reader(f))[1:]
          if len(ref) != len(out):
              print(f'Row count mismatch: ref={len(ref)}, out={len(out)}')
              sys.exit(1)
          errors = 0
          for i, (r, o) in enumerate(zip(ref, out)):
              dmin = abs(float(r[0]) - float(o[0]))
              dmax = abs(float(r[1]) - float(o[1]))
              if dmin > tol or dmax > tol:
                  print(f'  rxn {i}: ref=[{r[0]},{r[1]}] got=[{o[0]},{o[1]}] diff=[{dmin:.2e},{dmax:.2e}]')
                  errors += 1
          if errors:
              print(f'FAIL: {errors}/{len(ref)} reactions exceed tol {tol}')
              sys.exit(1)
          print(f'PASS: E. coli core — all {len(ref)} reactions within tol {tol}')
          "

      - name: Run VFFVA on E. coli K12
        working-directory: lib
        run: |
          export OMP_SCHEDULE="dynamic,50"
          mpirun -np ${{ matrix.mpi-procs }} \
                 --bind-to none \
                 --oversubscribe \
                 -x OMP_NUM_THREADS=${{ matrix.omp-threads }} \
                 ./veryfastFVA ../data/models/Ecoli_K12/Ecoli_K12.mps 90

      - name: Validate E. coli K12 output
        run: |
          OUTPUT="data/models/Ecoli_K12/Ecoli_K12output.csv"
          HEAD=$(head -1 "$OUTPUT")
          [ "$HEAD" = "minFlux,maxFlux" ] || { echo "Bad header: $HEAD"; exit 1; }
          LINES=$(wc -l < "$OUTPUT")
          [ "$LINES" -eq 2383 ] || { echo "Expected 2383 lines, got $LINES"; exit 1; }
          echo "E. coli K12: 2382 reactions OK"

      - name: Compare E. coli K12 against cobrapy
        run: |
          python3 -c "
          import csv, sys
          tol = 1e-3
          with open('data/models/Ecoli_K12/reference_fva.csv') as f:
              ref = list(csv.reader(f))[1:]
          with open('data/models/Ecoli_K12/Ecoli_K12output.csv') as f:
              out = list(csv.reader(f))[1:]
          if len(ref) != len(out):
              print(f'Row count mismatch: ref={len(ref)}, out={len(out)}')
              sys.exit(1)
          errors = 0
          for i, (r, o) in enumerate(zip(ref, out)):
              dmin = abs(float(r[0]) - float(o[0]))
              dmax = abs(float(r[1]) - float(o[1]))
              if dmin > tol or dmax > tol:
                  print(f'  rxn {i}: ref=[{r[0]},{r[1]}] got=[{o[0]},{o[1]}] diff=[{dmin:.2e},{dmax:.2e}]')
                  errors += 1
          if errors:
              print(f'FAIL: {errors}/{len(ref)} reactions exceed tol {tol}')
              sys.exit(1)
          print(f'PASS: E. coli K12 — all {len(ref)} reactions within tol {tol}')
          "

      - name: Run with reaction subset
        working-directory: lib
        run: |
          echo -e "0\n5\n10\n20\n50" > /tmp/test_rxns.csv
          export OMP_SCHEDULE="dynamic,50"
          mpirun -np ${{ matrix.mpi-procs }} \
                 --bind-to none \
                 --oversubscribe \
                 -x OMP_NUM_THREADS=${{ matrix.omp-threads }} \
                 ./veryfastFVA ../data/models/Ecoli_core/Ecoli_core.mps 90 0 /tmp/test_rxns.csv
          OUTPUT="../data/models/Ecoli_core/Ecoli_coreoutput.csv"
          LINES=$(wc -l < "$OUTPUT")
          [ "$LINES" -eq 6 ] || { echo "Expected 6 lines, got $LINES"; exit 1; }
          echo "Subset test passed: 5 reactions"

      - name: Collect coverage
        working-directory: lib
        run: |
          lcov --capture --directory . --output-file coverage.info --ignore-errors mismatch
          lcov --remove coverage.info '/usr/*' --output-file coverage.info
          lcov --list coverage.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lib/coverage.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
