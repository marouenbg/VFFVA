name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-glpk:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mpi-procs: [1]
        omp-threads: [2]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglpk-dev libopenmpi-dev openmpi-bin lcov

      - name: Build with GLPK
        working-directory: lib
        run: |
          make SOLVER=glpk COVERAGE=1 \
               GLPKINCDIR=/usr/include \
               GLPKLIBDIR=/usr/lib/x86_64-linux-gnu

      - name: Run VFFVA on E. coli core model
        working-directory: lib
        run: |
          export OMP_SCHEDULE="dynamic,50"
          mpirun -np ${{ matrix.mpi-procs }} \
                 --bind-to none \
                 --oversubscribe \
                 -x OMP_NUM_THREADS=${{ matrix.omp-threads }} \
                 ./veryfastFVA ../data/models/Ecoli_core/Ecoli_core.mps 90

      - name: Validate output
        working-directory: lib
        run: |
          OUTPUT="../data/models/Ecoli_core/Ecoli_coreoutput.csv"
          if [ ! -f "$OUTPUT" ]; then
            echo "ERROR: Output file not found"
            exit 1
          fi
          # Check header
          HEAD=$(head -1 "$OUTPUT")
          if [ "$HEAD" != "minFlux,maxFlux" ]; then
            echo "ERROR: Unexpected header: $HEAD"
            exit 1
          fi
          # E. coli core has 95 reactions → 95 data lines + 1 header = 96
          LINES=$(wc -l < "$OUTPUT")
          if [ "$LINES" -ne 96 ]; then
            echo "ERROR: Expected 96 lines, got $LINES"
            exit 1
          fi
          echo "Output validated: 95 reactions, header OK"

      - name: Compare against ground truth
        run: |
          python3 -c "
          import csv, sys
          tol = 1e-3
          ref_file = 'data/models/Ecoli_core/reference_fva_90pct.csv'
          out_file = 'data/models/Ecoli_core/Ecoli_coreoutput.csv'
          with open(ref_file) as f:
              ref = list(csv.reader(f))
          with open(out_file) as f:
              out = list(csv.reader(f))
          # skip headers
          ref = ref[1:]
          out = out[1:]
          if len(ref) != len(out):
              print(f'Row count mismatch: ref={len(ref)}, out={len(out)}')
              sys.exit(1)
          max_diff_min = 0
          max_diff_max = 0
          errors = 0
          for i, (r, o) in enumerate(zip(ref, out)):
              rmin, rmax = float(r[0]), float(r[1])
              omin, omax = float(o[0]), float(o[1])
              dmin = abs(rmin - omin)
              dmax = abs(rmax - omax)
              max_diff_min = max(max_diff_min, dmin)
              max_diff_max = max(max_diff_max, dmax)
              if dmin > tol or dmax > tol:
                  print(f'  rxn {i}: ref=[{rmin:.6f},{rmax:.6f}] got=[{omin:.6f},{omax:.6f}] diff=[{dmin:.2e},{dmax:.2e}]')
                  errors += 1
          print(f'Max diff: minFlux={max_diff_min:.6e}, maxFlux={max_diff_max:.6e}')
          if errors:
              print(f'FAIL: {errors} reactions exceed tolerance {tol}')
              sys.exit(1)
          print(f'PASS: all {len(ref)} reactions within tolerance {tol}')
          "

      - name: Run with reaction subset
        working-directory: lib
        run: |
          echo -e "0\n5\n10\n20\n50" > /tmp/test_rxns.csv
          export OMP_SCHEDULE="dynamic,50"
          mpirun -np ${{ matrix.mpi-procs }} \
                 --bind-to none \
                 --oversubscribe \
                 -x OMP_NUM_THREADS=${{ matrix.omp-threads }} \
                 ./veryfastFVA ../data/models/Ecoli_core/Ecoli_core.mps 90 0 /tmp/test_rxns.csv
          OUTPUT="../data/models/Ecoli_core/Ecoli_coreoutput.csv"
          LINES=$(wc -l < "$OUTPUT")
          if [ "$LINES" -ne 6 ]; then
            echo "ERROR: Expected 6 lines (5 rxns + header), got $LINES"
            exit 1
          fi
          echo "Subset test passed: 5 reactions"

      - name: Collect coverage
        working-directory: lib
        run: |
          lcov --capture --directory . --output-file coverage.info --ignore-errors mismatch
          lcov --remove coverage.info '/usr/*' --output-file coverage.info
          lcov --list coverage.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lib/coverage.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
